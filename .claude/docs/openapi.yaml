  /api/v1/vocabularies/ocr-scan:
    post:
      tags: [OCR]
      summary: Process OCR scan on uploaded image
      operationId: ocrScan
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                  description: Image file (max 10MB)
                type:
                  type: string
                  enum: [printed, handwritten, auto]
                language:
                  type: string
                  description: Language code (e.g. zh)
                engine:
                  type: string
                  enum: [paddleocr, tesseract, google_vision, baidu_ocr]
      responses:
        "200":
          description: OCR scan results
          content:
            application/json:
              schema:
                type: object
